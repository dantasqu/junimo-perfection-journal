<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Open book with a golden Junimo inside</title>
  <desc id="desc">A Stardew-inspired open storybook with warm parchment pages and a glowing golden Junimo sitting in the middle.</desc>
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8f5a2a" />
      <stop offset="100%" stop-color="#5a3417" />
    </linearGradient>
    <linearGradient id="pages" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8df" />
      <stop offset="100%" stop-color="#f0d8a4" />
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5b3215" />
      <stop offset="50%" stop-color="#7f4820" />
      <stop offset="100%" stop-color="#4d2911" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="42%">
      <stop offset="0%" stop-color="#ffeaa0" stop-opacity="0.95" />
      <stop offset="58%" stop-color="#f6c85e" stop-opacity="0.68" />
      <stop offset="100%" stop-color="#f6c85e" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="junimo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd972" />
      <stop offset="100%" stop-color="#df9d32" />
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#85c95a" />
      <stop offset="100%" stop-color="#4e9e43" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#4c2b11" flood-opacity="0.28" />
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#66401d" flood-opacity="0.18" />
    </filter>
