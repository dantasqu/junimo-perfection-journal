<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-labelledby="title desc">
  <title id="title">Open Stardew-style book with a Junimo on the right page</title>
  <desc id="desc">A clear open brown book inspired by Stardew Valley, with cream pages, a visible spine, and a green Junimo sprite on the right page.</desc>
  <defs>
    <linearGradient id="coverBrown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d684f" />
      <stop offset="100%" stop-color="#5d3f2d" />
    </linearGradient>
    <linearGradient id="coverEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4d3425" />
      <stop offset="50%" stop-color="#734f39" />
      <stop offset="100%" stop-color="#422c20" />
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7dc" />
      <stop offset="100%" stop-color="#efd7a2" />
    </linearGradient>
    <linearGradient id="pageEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8b36f" />
      <stop offset="100%" stop-color="#c39449" />
    </linearGradient>
    <radialGradient id="junimoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff1ab" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#fff1ab" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#4b311e" flood-opacity="0.28" />
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#4b311e" flood-opacity="0.18" />
    </filter>
  </defs>

  <ellipse cx="320" cy="410" rx="225" ry="28" fill="#53361f" opacity="0.16" />

  <g filter="url(#shadow)">
    <path
      d="M82 346L110 176L300 212L300 376L104 352Z"
      fill="url(#coverBrown)"
      stroke="#4d3425"
      stroke-width="7"
      stroke-linejoin="round"
    />
    <path
      d="M558 346L530 176L340 212L340 376L536 352Z"
      fill="url(#coverBrown)"
      stroke="#4d3425"
      stroke-width="7"
      stroke-linejoin="round"
    />

    <path
      d="M104 334L126 190L300 220L300 364L124 343Z"
      fill="url(#paper)"
      stroke="#c79c5b"
      stroke-width="4"
      stroke-linejoin="round"
    />
    <path
      d="M536 334L514 190L340 220L340 364L516 343Z"
      fill="url(#paper)"
      stroke="#c79c5b"
      stroke-width="4"
      stroke-linejoin="round"
    />

    <path
      d="M303 208C311 205 318 204 320 204C322 204 329 205 337 208V376C329 380 322 382 320 382C318 382 311 380 303 376V208Z"
      fill="url(#coverEdge)"
