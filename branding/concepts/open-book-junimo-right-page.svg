      stroke-width="4"
      stroke-linejoin="round"
    />

    <path d="M143 223L143 338" stroke="#d8c089" stroke-width="3" stroke-linecap="round" />
    <path d="M167 217L167 335" stroke="#d8c089" stroke-width="3" stroke-linecap="round" />
    <path d="M190 220L190 333" stroke="#d8c089" stroke-width="3" stroke-linecap="round" />
