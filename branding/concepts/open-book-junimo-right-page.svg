    <path d="M497 223L497 338" stroke="#d8c089" stroke-width="3" stroke-linecap="round" />
    <path d="M473 217L473 335" stroke="#d8c089" stroke-width="3" stroke-linecap="round" />
    <path d="M450 220L450 333" stroke="#d8c089" stroke-width="3" stroke-linecap="round" />
    <path d="M427 224L427 331" stroke="#d8c089" stroke-width="3" stroke-linecap="round" />
    <path d="M404 228L404 328" stroke="#d8c089" stroke-width="3" stroke-linecap="round" />
    <path d="M381 232L381 326" stroke="#d8c089" stroke-width="3" stroke-linecap="round" />
    <path d="M358 236L358 323" stroke="#d8c089" stroke-width="3" stroke-linecap="round" />

    <path d="M123 343L300 364" stroke="url(#pageEdge)" stroke-width="7" stroke-linecap="round" opacity="0.9" />
    <path d="M517 343L340 364" stroke="url(#pageEdge)" stroke-width="7" stroke-linecap="round" opacity="0.9" />

    <path d="M140 256C180 242 228 240 286 252" fill="none" stroke="#d9c391" stroke-width="5" stroke-linecap="round" opacity="0.7" />
    <path d="M137 287C182 273 229 272 286 282" fill="none" stroke="#d9c391" stroke-width="5" stroke-linecap="round" opacity="0.62" />
    <path d="M500 256C460 242 412 240 354 252" fill="none" stroke="#d9c391" stroke-width="5" stroke-linecap="round" opacity="0.7" />
    <path d="M503 287C458 273 411 272 354 282" fill="none" stroke="#d9c391" stroke-width="5" stroke-linecap="round" opacity="0.62" />
  </g>

  <circle cx="442" cy="249" r="72" fill="url(#junimoGlow)" />

  <g filter="url(#soft)">
    <ellipse cx="446" cy="302" rx="46" ry="14" fill="#6f522b" opacity="0.16" />
    <image
      x="394"
      y="194"
      width="96"
      height="96"
      preserveAspectRatio="xMidYMid meet"
      image-rendering="pixelated"
      href="data:image/gif;base64,"
